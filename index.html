<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RISA Funnels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --card:#f1f2f5; --card-hover:#eceef2; --hero:#0c0e13;
    --ink:#0c0e13; --ink-2:#6b7280; --ink-3:#a2a8b4;
    --line:#ececf0; --shadow:0 1px 2px rgba(12,14,19,.04),0 18px 44px -26px rgba(12,14,19,.22);
    --accent:#0F5BFF; --accent-soft:rgba(15,91,255,.10); --accent-ring:rgba(15,91,255,.16);
    --display:"Schibsted Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --engine:#0F5BFF; --careteam:#0f8a7e; --patient:#c06a2e; --payer:#7c53c9; --system:#7b8296;
    --r:20px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.55}
  body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

  .head{position:relative;padding:24px 32px 0;display:flex;flex-direction:column;gap:14px}
  .toggle{position:absolute;top:24px;right:32px;z-index:5;display:inline-flex;background:var(--card);border-radius:999px;padding:4px;gap:2px}
  .toggle button{border:0;background:transparent;font-family:var(--display);font-weight:500;font-size:13.5px;color:var(--ink-2);
    padding:9px 20px;border-radius:999px;cursor:pointer;transition:.18s cubic-bezier(.4,0,.2,1);letter-spacing:-.01em}
  .toggle button:hover{color:var(--ink)}
  .toggle button.on{background:var(--hero);color:#fff}
  .brand h1{font-family:var(--display);font-weight:700;font-size:30px;letter-spacing:-.025em;margin:0;line-height:1.02}
  .brand p{margin:6px 0 0;font-weight:450;color:var(--ink-2);font-size:14.5px}
  .legend{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;font-size:12.5px}
  .lg{display:inline-flex;align-items:center;gap:7px;font-weight:500;color:var(--ink-2);background:var(--card);padding:6px 12px;border-radius:999px}
  .lg i{width:9px;height:9px;border-radius:50%}

  .stage{flex:1 1 auto;position:relative;margin:18px 24px 0}
  .scroll{position:absolute;inset:0;overflow:auto;scroll-behavior:smooth}
  .scroll::-webkit-scrollbar{height:10px;width:10px}
  .scroll::-webkit-scrollbar-thumb{background:#dfe2e9;border-radius:6px;border:2px solid var(--bg)}
  .scroll::-webkit-scrollbar-thumb:hover{background:#cfd3dd}
  .canvas{position:relative}
  svg.bg{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:1}
  .group{position:absolute;z-index:0;border:1px solid var(--line);background:#fafbfc;border-radius:20px;pointer-events:none}
  .group-lbl{position:absolute;top:12px;left:18px;font-family:var(--display);font-weight:600;font-size:13.5px;letter-spacing:-.01em;color:var(--ink-2);background:#fafbfc;padding:0 6px}

  .node{position:absolute;z-index:2;border-radius:var(--r);border:1px solid transparent;background:var(--card);
    padding:15px 17px 14px;transition:opacity .34s cubic-bezier(.4,0,.2,1),background .3s,box-shadow .34s,transform .24s cubic-bezier(.4,0,.2,1),color .3s;
    opacity:1;cursor:pointer}
  .node:hover{background:var(--card-hover)}
  .node .tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--display);font-size:11.5px;font-weight:600;letter-spacing:-.005em}
  .node .tag .dot{width:8px;height:8px;border-radius:50%}
  .node .nt{margin-top:9px;font-family:var(--display);font-weight:500;font-size:15px;line-height:1.26;letter-spacing:-.015em;color:var(--ink)}
  .node .nt-sub{margin-top:7px;font-size:11.5px;font-weight:500;color:var(--ink-2)}
  .node.active .nt-sub{color:rgba(255,255,255,.72)}
  .node .foot{margin-top:12px;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-2)}
  .node .foot .mn{font-weight:600;color:var(--ink)}
  .node .foot .pct{font-family:var(--display);font-weight:600;font-size:11px;padding:2px 8px;border-radius:999px;background:#e3e6ec;color:#5b6270}

  /* selected = black hero card */
  .node.active{opacity:1;transform:translateY(-3px);background:var(--hero);
    box-shadow:0 20px 44px -22px rgba(12,14,19,.55),0 2px 6px rgba(12,14,19,.12)}
  .node.active .nt{color:#fff}
  .node.active .foot{color:rgba(255,255,255,.68)}
  .node.active .foot .mn{color:#fff}
  .node.active .foot .pct{background:var(--accent);color:#fff}

  /* System of record — OncoEMR logo lockup */
  .node.system{background:var(--card);border:1px solid transparent;border-radius:16px;padding:15px 17px;display:flex;align-items:center;justify-content:center;opacity:1;
    transition:opacity .34s cubic-bezier(.4,0,.2,1),background .3s,box-shadow .34s,transform .24s cubic-bezier(.4,0,.2,1)}
  .node.system:hover{background:var(--card-hover)}
  .emr-logo{display:flex;align-items:center;gap:10px}
  .emr-mark{display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .emr-word{font-family:var(--display);font-size:16px;letter-spacing:-.01em;color:var(--ink);white-space:nowrap;display:inline-flex;align-items:flex-start}
  .emr-word b{font-weight:700}
  .emr-word .e2{font-weight:500;margin-left:3px}
  .emr-word sup{font-size:8px;font-weight:500;margin-left:1px;line-height:1;color:var(--ink-3)}
  .node.system.active{opacity:1;transform:translateY(-3px);background:var(--hero);
    box-shadow:0 20px 44px -22px rgba(12,14,19,.55),0 2px 6px rgba(12,14,19,.12)}
  .node.system.active .emr-word{color:#fff}
  .node.system.active .emr-word sup{color:rgba(255,255,255,.6)}

  .marching{fill:none;stroke-linecap:round}
  @media (prefers-reduced-motion: no-preference){.marching.live{animation:mm 1s linear infinite}}
  @keyframes mm{to{stroke-dashoffset:-16}}

  .detail{flex:0 0 auto;margin:16px 24px 20px;background:var(--bg);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px 26px;max-height:54vh;overflow:auto}
  .dhead{display:flex;align-items:flex-start;gap:13px;flex-wrap:wrap}
  .dcat{font-family:var(--display);font-size:12.5px;font-weight:600;letter-spacing:-.005em;display:inline-flex;align-items:center;gap:7px}
  .dcat .dot{width:8px;height:8px;border-radius:50%}
  .dtitle{font-family:var(--display);font-weight:600;font-size:23px;letter-spacing:-.025em}
  .metrics{margin-left:auto;display:flex;gap:26px;align-items:baseline}
  .metric{text-align:right}.metric .v{font-family:var(--display);font-weight:600;font-size:22px;letter-spacing:-.02em}
  .metric.lead .v{color:var(--accent)}
  .metric .k{font-size:10.5px;color:var(--ink-3);font-weight:500;letter-spacing:.04em;text-transform:uppercase}
  .metric.drop .v{color:#d1453b}
  .ddesc{margin-top:12px;color:#3a4256;font-size:15px;max-width:78ch;line-height:1.6}
  .ex{margin-top:15px;border-top:1px solid var(--line);padding-top:13px}
  .ex .lbl{font-size:10.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
  .ex .txt{margin-top:6px;font-size:14px;color:#404860;line-height:1.55}
  .ex .txt code{background:var(--accent-soft);color:var(--accent);padding:1px 6px;border-radius:5px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace}

  /* Query step — two views */
  .qv-toggle{display:inline-flex;background:var(--card);border-radius:999px;padding:3px;gap:2px;margin-top:15px}
  .qv-toggle button{border:0;background:transparent;font-family:var(--display);font-weight:500;font-size:12.5px;color:var(--ink-2);padding:7px 16px;border-radius:999px;cursor:pointer;transition:.16s}
  .qv-toggle button:hover{color:var(--ink)}
  .qv-toggle button.on{background:var(--hero);color:#fff}
  .qv-body{margin-top:16px}

  /* outcomes bars */
  .oc-row{display:grid;grid-template-columns:220px 1fr 54px;align-items:center;gap:14px;font-size:13px;margin-bottom:12px}
  .oc-label{color:var(--ink)}
  .oc-track{height:9px;background:#e7e9ef;border-radius:999px;overflow:hidden}
  .oc-fill{height:100%;border-radius:999px;transition:width .55s cubic-bezier(.4,0,.2,1)}
  .oc-pct{font-family:var(--display);font-weight:600;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}
  .oc-cap{margin-top:14px;font-size:11.5px;color:var(--ink-3);max-width:78ch;line-height:1.5}

  /* query-type buckets */
  .bk{display:grid;grid-template-columns:66px 1fr 30px;align-items:start;gap:16px;padding:14px 0;border-top:1px solid var(--line)}
  .bk:first-child{border-top:0}
  .bk-pct{font-family:var(--display);font-weight:600;font-size:13px;color:#fff;background:var(--hero);border-radius:9px;padding:8px 2px;text-align:center;letter-spacing:-.01em}
  .bk-name{font-family:var(--display);font-weight:600;font-size:14.5px;letter-spacing:-.01em;color:var(--ink);line-height:1.25}
  .bk-def{margin-top:5px;font-size:12.5px;color:var(--ink-2);line-height:1.5;max-width:72ch}
  .bk-eye{position:relative;display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;color:var(--ink-3);cursor:help;outline:none;transition:.15s}
  .bk-eye:hover,.bk-eye:focus-visible{color:var(--accent);background:var(--accent-soft)}
  .bk-pop{position:absolute;right:calc(100% + 12px);top:-8px;width:320px;background:var(--hero);color:#fff;border-radius:14px;padding:14px 16px;
    box-shadow:0 22px 54px -20px rgba(12,14,19,.6);opacity:0;visibility:hidden;transform:translateX(6px);transition:.16s cubic-bezier(.4,0,.2,1);z-index:30;pointer-events:none}
  .bk-eye:hover .bk-pop,.bk-eye:focus-within .bk-pop{opacity:1;visibility:visible;transform:translateX(0)}
  .bk-pop b{display:block;font-family:var(--display);font-weight:600;font-size:13px;margin-bottom:6px;color:#fff}
  .bk-pop i{font-style:normal;font-size:12.5px;line-height:1.55;color:rgba(255,255,255,.82)}
  .bk-pop:after{content:"";position:absolute;right:-5px;top:18px;width:11px;height:11px;background:var(--hero);transform:rotate(45deg)}

  /* detailed dropdown + donut */
  .qd-more{margin-top:18px;border-top:1px solid var(--line);padding-top:15px}
  .qd-more-btn{display:inline-flex;align-items:center;gap:8px;border:0;background:transparent;cursor:pointer;font-family:var(--display);font-weight:600;font-size:12.5px;color:var(--accent);padding:0}
  .qd-more-btn .chev{transition:transform .2s}
  .qd-more-btn.open .chev{transform:rotate(90deg)}
  .qd-pie-wrap{margin-top:18px;display:grid;grid-template-columns:190px 1fr;gap:28px;align-items:center}
  @media (max-width:760px){.qd-pie-wrap{grid-template-columns:1fr;justify-items:center}}
  .qd-legend{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 28px}
  .qd-leg{display:grid;grid-template-columns:11px 1fr auto;align-items:center;gap:10px;font-size:12px}
  .qd-leg i{width:11px;height:11px;border-radius:3px}
  .qd-leg .lb{color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qd-leg .pc{font-family:var(--display);font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
  .qd-cap{margin-top:12px;font-size:11px;color:var(--ink-3)}

  /* popover bullets */
  .bk-pop ul{margin:10px 0 0;padding:0;list-style:none}
  .bk-pop li{position:relative;padding-left:15px;font-size:12px;line-height:1.5;color:rgba(255,255,255,.82);margin:6px 0}
  .bk-pop li:before{content:"";position:absolute;left:1px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--accent)}

  /* outcomes flowchart */
  .flow{display:flex;align-items:center;margin-top:4px}
  .flow-pre{flex:0 0 auto;background:#f5f6f8;border:1px solid var(--line);border-radius:12px;padding:12px 15px;text-align:left}
  .flow-pre-p{font-family:var(--display);font-weight:600;font-size:18px;color:var(--ink-3);line-height:1;letter-spacing:-.01em}
  .flow-pre-l{font-size:11px;color:var(--ink-3);margin-top:5px}
  .flow-a{flex:0 0 auto;margin:0 8px}
  .flow-src{flex:0 0 auto;background:var(--hero);color:#fff;border-radius:14px;padding:15px 17px}
  .flow-src-pct{font-family:var(--display);font-weight:600;font-size:23px;letter-spacing:-.02em;line-height:1}
  .flow-src-title{font-family:var(--display);font-weight:600;font-size:15px;color:#fff;letter-spacing:-.01em;line-height:1.2}
  .flow-src-l{font-size:12px;color:rgba(255,255,255,.68);margin-top:5px}
  .flow-links{flex:0 0 auto;display:block}
  .flow-outs{flex:1 1 auto;display:flex;flex-direction:column;gap:12px}
  .flow-out{height:46px;display:flex;align-items:center;gap:13px;background:var(--card);border-radius:12px;padding:0 16px;border-left:3px solid #b6bcc8}
  .flow-out .fo-pct{font-family:var(--display);font-weight:600;font-size:15px;min-width:46px;font-variant-numeric:tabular-nums}
  .flow-out .fo-l{font-size:13px;color:var(--ink)}

  /* categories flowchart — same component as the outcomes flow */
  .catflow{display:flex;align-items:center;margin-top:4px}
  .cf-links{flex:0 0 auto;align-self:center;display:block}
  .cf-cards{flex:1 1 auto;display:flex;flex-direction:column;gap:12px}
  .cf-card{border-top:0!important;background:var(--card);border-radius:12px;padding:14px 16px;align-items:center;border-left:3px solid var(--accent)}
  .cf-pct{font-family:var(--display);font-weight:600;font-size:15px;color:var(--accent);min-width:60px;font-variant-numeric:tabular-nums}

  /* context-card header: category stacked above title */
  .dh-title{display:flex;flex-direction:column;gap:7px;align-items:flex-start;min-width:0}

  /* enriched context card (clinical-trial steps) */
  .detail code{background:var(--accent-soft);color:var(--accent);padding:1px 6px;border-radius:5px;font-size:12px;font-family:ui-monospace,Menlo,monospace}
  .dbul{margin:13px 0 0;padding:0;list-style:none}
  .dbul li{position:relative;padding-left:17px;font-size:13.5px;color:#3a4256;line-height:1.55;margin:7px 0;max-width:88ch}
  .dbul li:before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .dbranch{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px}
  .dchip{display:inline-flex;align-items:center;font-family:var(--display);font-weight:500;font-size:12px;background:var(--card);border-radius:999px;padding:7px 13px;color:var(--ink)}
  .dchip:before{content:"→";color:var(--ink-3);margin-right:7px;font-weight:600}
  .dloop{margin-top:13px;font-size:12.5px;color:var(--accent);display:flex;gap:8px;align-items:baseline;line-height:1.5;max-width:86ch;font-weight:500}
  .dmeta{margin-top:14px;font-size:12.5px;color:var(--ink-2);line-height:1.5}
  .dmeta b{font-family:var(--display);font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.06em;font-size:10px;margin-right:9px}

  /* non-selectable terminal cards */
  .node.static{opacity:.5;cursor:default;border:1px dashed #ccd1db;background:#f5f6f8}
  .node.static:hover{opacity:.5;background:#f5f6f8}

  /* branch ghost nodes on the canvas (shown when a decision step is selected) */
  .ghost{position:absolute;z-index:3;display:flex;align-items:center;justify-content:center;height:38px;
    background:#f5f6f8;border:1px dashed #ccd1db;border-radius:10px;color:var(--ink-3);
    font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:.01em;pointer-events:none;
    animation:ghostin .28s cubic-bezier(.4,0,.2,1)}
  @keyframes ghostin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div class="head">
    <div class="toggle" id="toggle">
      <button data-k="ct" class="on">Clinical trials</button>
      <button data-k="pa">Prior authorization</button>
    </div>
    <div class="brand"><h1 id="ftitle"></h1><p id="fsub"></p></div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="stage">
    <div class="scroll" id="scroll" tabindex="0">
      <div class="canvas" id="canvas"><svg class="bg" id="bg"></svg></div>
    </div>
  </div>

  <div class="detail" id="detail"></div>

<script>
const COLORS={engine:"#0F5BFF",careteam:"#0f8a7e",patient:"#c06a2e",payer:"#7c53c9",system:"#0F5BFF",risa:"#0F5BFF",prov:"#c06a2e",pat:"#7c53c9",hitl:"#CA8A04"};
const CATNAME={engine:"RISA engine",careteam:"Care team",patient:"Patient",payer:"Payer",system:"System of record",risa:"RISA",prov:"Provider-side",pat:"Patient-side",hitl:"Human in the loop (provider side)"};
const ONCO_MARK=`<svg width="30" height="26" viewBox="0 0 40 34" fill="none"><defs><linearGradient id="ol" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6a4bea"/><stop offset="1" stop-color="#4657d6"/></linearGradient></defs><path d="M8 2 L22 2 L16 20 L2 20 Z" fill="url(#ol)"/><path d="M20 12 L34 12 L28 32 L14 32 Z" fill="#2f86ff"/></svg>`;
const HELP=`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
const CHEV=`<svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;
const PIE=["#0F5BFF","#2f6dff","#4f80ff","#6c93ff","#88a6ff","#a3b8ff","#bfcbf6","#cdd6ec","#dae0ee","#e6e9f1","#eff1f6"];

function n(id,col,row,cat,t,desc,ex,pct,count){return {id,col,row,cat,t,desc,ex,pct,count};}

const FUNNELS={
 ct:{
  title:"Clinical Trial Patient Matching Funnel", sub:"Patient charts read from the EMR, matched to a protocol, patients enrolled into clinical trials",
  exlabel:"Example", legend:["risa","prov","pat"],
  nodes:[
   {id:"emr",col:0,row:0,cat:"system",tag:"System of record",t:"OncoEMR",
    desc:"The site's EMR and system of record. RISA reads charts over a live HL7 FHIR R4 connection (via Flatiron) and writes match and enrollment status back.",
    bullets:["In reach: <code>Patient</code>, <code>Condition</code> (ICD-10), <code>Observation</code> (LOINC), <code>MedicationRequest</code> (RxNorm), <code>Procedure</code>, <code>DiagnosticReport</code>, <code>AllergyIntolerance</code>, <code>Immunization</code>, <code>AdverseEvent</code>."],
    ex:"Charts stream in through the HL7 FHIR connection; the match and enrollment status post back to the patient record."},
   {id:"mrns",col:1,row:0,cat:"risa",tag:"RISA automated",t:"MRNs screened",
    desc:"Batches of patient MRNs on the EMR enter the funnel.",
    bullets:["Fired by five triggers: new-trial clock (score the whole pool once), amendment clock (re-score the matched cohort), patient clock (new document or HL7 FHIR delta every 1 to 2 days), time and calendar clock (a window lapses), and manual or referral entry.","A one-time go-live backfill scores every existing patient against every active trial.","A broad pre-filter on primary <code>Condition</code> or ICD, age and sex narrows the trial book to the 2 to 3 plausible trials."],
    source:"Trigger: trial activation, patient document or HL7 FHIR delta, scheduler, manual referral, or go-live backfill.",
    ex:"A new NSCLC patient: <code>Condition</code> C34.x narrows the book to lung trials before deeper evaluation."},
   {id:"dx",col:2,row:0,cat:"risa",tag:"RISA decision",t:"Diagnosis match confirmed",
    desc:"The cheapest T1 gate. Does the patient's indication match the trial? Non-matching charts drop here.",
    bullets:["Basis: <code>Condition</code> ICD-10 (for example NSCLC C34.x) plus histology."],
    branches:["Match: continue","No match (for example wrong histology): Closed"],
    fork:{pass:"Match",alts:[{label:"No match",term:"Closed"}]},
    source:"Trigger: T1 pre-filter on Condition and histology.",
    ex:"Histologically confirmed NSCLC (C34.x) passes; a non-NSCLC chart drops out."},
   {id:"chunks",col:3,row:0,cat:"risa",tag:"RISA automated",t:"Independently evaluable chunks matched against patient records",
    desc:"Each criterion is broken into atoms, one independently evaluable fact each, and every atom is matched against the record.",
    bullets:["AND and OR logic is captured; each atom is pass-if-true (inclusion) or pass-if-false (exclusion).","Atoms are tiered T1 (HL7 FHIR-deterministic), T2 (HL7 FHIR plus confidence), T3 (CRC action) and T4 (PI judgment), mapped to LOINC, ICD-10, RxNorm and SNOMED, with hard-stop flags and time windows.","Evaluation runs a cascade from T1 to T4 under a 3-layer confidence model: recency gate, data confidence, risk-calibrated auto-pass bar."],

function fmtPct(p){return (p<1?p.toFixed(1):p===Math.round(p)?p:p.toFixed(1))+"%";}

function measure(){
  byId={}; NODES.forEach(x=>byId[x.id]=x);
  const maxCol=Math.max(...NODES.map(x=>x.col));
  const minRow=Math.min(...NODES.map(x=>x.row)), maxRow=Math.max(...NODES.map(x=>x.row));
  CANW=X0+maxCol*PITCH+W+40;
  const span=(maxRow-minRow)*ROWGAP+240;
  CANH=Math.max(scroll.clientHeight, span, 400);
  CY=Math.round(CANH/2 - ((minRow+maxRow)/2)*ROWGAP);
  canvas.style.width=CANW+"px"; canvas.style.height=CANH+"px";
  bg.setAttribute("width",CANW); bg.setAttribute("height",CANH); bg.setAttribute("viewBox",`0 0 ${CANW} ${CANH}`);
  NODES.forEach(nd=>{ nd.x=X0+nd.col*PITCH; nd.cy=CY+nd.row*ROWGAP; });
}
function buildNodes(){
  [...canvas.querySelectorAll(".node")].forEach(x=>x.remove()); el={};
  NODES.forEach(nd=>{

      const foot = nd.pct!=null?`<div class="foot"><span class="mn">${fmtPct(nd.pct)}</span> <span class="fu">${A.denom}</span></div>`:"";

function edgePath(a,b,type){
  const aY=a.cy+(el[a.id]?el[a.id].offsetHeight/2:42), bY=b.cy+(el[b.id]?el[b.id].offsetHeight/2:42);
  if(type==="return"){
    const hi=34, aTop=a.cy-(el[a.id]?el[a.id].offsetHeight/2:42), bTop=b.cy-(el[b.id]?el[b.id].offsetHeight/2:42);
    return `M ${a.x+nW(a)/2} ${aTop} C ${a.x+nW(a)/2} ${hi}, ${b.x+nW(b)/2} ${hi}, ${b.x+nW(b)/2} ${bTop}`;
  }
  if(type==="join"){
    const ax=a.x+nW(a)/2, aBot=a.cy+(el[a.id]?el[a.id].offsetHeight/2:42);
    const bx=b.x+nW(b)/2, bBot=b.cy+(el[b.id]?el[b.id].offsetHeight/2:42);
    const low=Math.max(aBot,bBot)+52;
    return `M ${ax} ${aBot} C ${ax} ${low}, ${bx} ${low}, ${bx} ${bBot+4}`;
  }
  const ax=a.x+nW(a), ay=a.cy, bx=b.x, by=b.cy;
  const mx=(ax+bx)/2;
  return `M ${ax} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${bx-9} ${by}`;
}
function edgeLabel(x,y,text,color){

  bg.appendChild(t);
}

  [...canvas.querySelectorAll(".group")].forEach(x=>x.remove());
  (A.groups||[]).forEach(g=>{
    const ids=[]; let on=false;
    for(const nd of NODES){ if(nd.id===g.from) on=true; if(on) ids.push(nd); if(nd.id===g.to) break; }
    if(!ids.length) return;
    let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
    ids.forEach(nd=>{ const d=el[nd.id]; const w=nW(nd), h=d?d.offsetHeight:80;
      minX=Math.min(minX,nd.x); maxX=Math.max(maxX,nd.x+w);
      minY=Math.min(minY,nd.cy-h/2); maxY=Math.max(maxY,nd.cy+h/2); });
    const padX=22, padT=38, padB=20;
    const box=document.createElement("div"); box.className="group";
    box.style.left=(minX-padX)+"px"; box.style.top=(minY-padT)+"px";
    box.style.width=(maxX-minX+padX*2)+"px"; box.style.height=(maxY-minY+padT+padB)+"px";
    box.innerHTML=`<span class="group-lbl">${g.label}</span>`;
    canvas.appendChild(box);
  });
}
function renderGhosts(){
  [...canvas.querySelectorAll(".ghost")].forEach(x=>x.remove());
  const s=sel?byId[sel]:null; if(!s||!s.fork) return;
  const h=el[s.id]?el[s.id].offsetHeight:70;
  const gw=150, gh=36, gap=26;
  const cx=s.x+nW(s)/2, left=cx-gw/2, base=s.cy+h/2+30;
  s.fork.alts.forEach((al,i)=>{
    const top=base+i*(gh+gap);
    const g=document.createElement("div");
    g.className="ghost"; g.style.width=gw+"px"; g.style.height=gh+"px"; g.style.left=left+"px"; g.style.top=top+"px";
    g.textContent=al.term;
    canvas.appendChild(g);
    al.gx=left; al.gy=top+gh/2; al.gcx=left+gw/2; al.gtop=top;
  });
}
function drawEdges(){
  [...bg.querySelectorAll(".edge, defs")].forEach(x=>x.remove());
  const defs=E("defs"); defs.appendChild(ah("ah-l",IDLE)); defs.appendChild(ah("ah-b",LIVE)); bg.appendChild(defs);
  A.edges.forEach((ed)=>{
    const [f,t,type,label]=ed;
    if(type==="return" && sel!==f) return;           /* return arrow hidden until last step selected */
    const a=byId[f], b=byId[t]; if(!a||!b) return;
    const live = sel && (f===sel||t===sel);
    const sub = type==="sub";
    const d=edgePath(a,b,type);
    const stroke = live ? LIVE : IDLE;
    const mk = live ? "url(#ah-b)" : "url(#ah-l)";
    const p=E("path",{class:"edge marching"+(live?" live":""),d,fill:"none",stroke,"marker-end":mk,"stroke-width":live?"2.3":"1.6","stroke-linecap":"round"});
    if(sub||type==="return"||type==="join") p.setAttribute("stroke-dasharray","6 6");
    else if(live) p.setAttribute("stroke-dasharray",".5 7.5");
    bg.appendChild(p);
    if(label){
      let lx,ly;
      if(type==="return"){ lx=((a.x+nW(a)/2)+(b.x+nW(b)/2))/2; ly=27; }
      else { lx=((a.x+nW(a))+b.x)/2; ly=(a.cy+b.cy)/2-8; }
      edgeLabel(lx,ly,label,"#8a91a0");
    }
  });
  const s=sel?byId[sel]:null;
  if(s&&s.fork){
    const fe=A.edges.find(e=>e[0]===sel&&e[2]==="main");
    if(fe&&byId[fe[1]]){const b=byId[fe[1]]; edgeLabel((s.x+nW(s)+b.x)/2, s.cy-11, s.fork.pass, LIVE);}
    const trunkX=s.x+8, oy=s.cy+(el[s.id]?el[s.id].offsetHeight/2:42);
    s.fork.alts.forEach(al=>{
      if(al.gx==null) return;
      const gx=al.gx, gy=al.gy;
      const d=`M ${trunkX} ${oy} C ${trunkX} ${gy}, ${trunkX} ${gy}, ${gx-4} ${gy}`;
      bg.appendChild(E("path",{class:"edge",d,fill:"none",stroke:"#c2c7d0","stroke-width":"1.6","marker-end":"url(#ah-l)","stroke-dasharray":"5 5","stroke-linecap":"round"}));
      edgeLabel(al.gcx, al.gtop-11, al.label, "#8a91a0");
    });
  }
}
function renderLegend(){
  document.getElementById("legend").innerHTML=A.legend.map(k=>
    `<span class="lg" style="color:${COLORS[k]}"><i style="background:${COLORS[k]}"></i>${CATNAME[k]}</span>`).join("");
}
function renderPie(items){
  const cx=95,cy=95,r=58,sw=30,C=2*Math.PI*r;
  let acc=0;
  const circles=items.map((it,i)=>{
    const f=it.pct/100, len=f*C, off=-acc*C; acc+=f;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${PIE[i%PIE.length]}" stroke-width="${sw}" stroke-linecap="butt" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"></circle>`;
  }).join("");
  const legend=items.map((it,i)=>`
    <div class="qd-leg"><i style="background:${PIE[i%PIE.length]}"></i><span class="lb" title="${it.label}">${it.label}</span><span class="pc">${it.pct.toFixed(1)}%</span></div>`).join("");
  return `<div class="qd-pie-wrap">
    <svg width="190" height="190" viewBox="0 0 190 190" role="img" aria-label="Detailed query-reason breakdown">${circles}
      <text x="95" y="91" text-anchor="middle" font-family="Schibsted Grotesk,sans-serif" font-weight="600" font-size="17" fill="#0c0e13">11</text>
      <text x="95" y="106" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#a2a8b4" letter-spacing="1.2">REASONS</text>
    </svg>
    <div><div class="qd-legend">${legend}</div><div class="qd-cap">Granular reasons as a share of all queries raised.</div></div>
  </div>`;
}
function renderOutcomesFlow(nd){
  const tone={pos:"#0F5BFF",neutral:"#8a91a0",neg:"#d1453b"};
  const ys=[23,81,139,197];
  const mk={pos:"url(#fa-pos)",neutral:"url(#fa-neu)",neg:"url(#fa-neg)"};
  const defs=`<defs>${["pos","neutral","neg"].map(k=>`<marker id="fa-${k==="neutral"?"neu":k}" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="${tone[k]}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker>`).join("")}</defs>`;
  const paths=nd.outcomes.map((o,i)=>`<path d="M0 110 C 48 110 48 ${ys[i]} 92 ${ys[i]}" fill="none" stroke="${tone[o.tone]}" stroke-width="1.8" marker-end="${mk[o.tone]}"/>`).join("");
  const outs=nd.outcomes.map(o=>`<div class="flow-out" style="border-left-color:${tone[o.tone]}"><div class="fo-pct" style="color:${tone[o.tone]}">${fmtPct(o.pct)}</div><div class="fo-l">${o.label}</div></div>`).join("");
  return `<div class="flow">
    <div class="flow-src"><div class="flow-src-title">Queries raised</div></div>
    <svg class="flow-links" width="96" height="220" viewBox="0 0 96 220">${defs}${paths}</svg>
    <div class="flow-outs">${outs}</div>
  </div>
  <div class="oc-cap">Share of the queries raised. Approved via change / rework and approved directly together clear the large majority; denials stay under 1%.</div>`;
}
function renderCategoriesFlow(nd){
  const cards=nd.buckets.map(b=>`
    <div class="bk cf-card">
      <div class="cf-pct">${b.pct}</div>
      <div class="bk-main">
        <div class="bk-name">${b.name}</div>
        <div class="bk-def">${b.def}</div>
      </div>
      <div class="bk-eye" tabindex="0" role="button" aria-label="How it's resolved">${HELP}
        <div class="bk-pop"><b>${b.rtitle}</b><i>${b.lead}</i><ul>${b.bullets.map(x=>`<li>${x}</li>`).join("")}</ul></div>
      </div>
    </div>`).join("");
  return `<div class="catflow">
    <div class="flow-src"><div class="flow-src-title">Queries raised</div></div>
    <svg class="cf-links" id="cfLinks" aria-hidden="true"></svg>
    <div class="cf-cards" id="cfCards">${cards}</div>
  </div>`;
}
function layoutCatFlow(){
  const svg=document.getElementById("cfLinks"), cards=document.getElementById("cfCards");
  if(!svg||!cards) return;
  const cr=cards.getBoundingClientRect();
  const H=cr.height, W=96, cy=H/2;
  const defs=`<defs><marker id="cf-a" viewBox="0 0 10 10" refX="7.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#0F5BFF" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
  const paths=[...cards.children].map(k=>{const r=k.getBoundingClientRect();const yc=r.top-cr.top+r.height/2;return `<path d="M0 ${cy} C 48 ${cy} 48 ${yc} ${W-4} ${yc}" fill="none" stroke="#0F5BFF" stroke-width="1.8" marker-end="url(#cf-a)"/>`;}).join("");
  svg.setAttribute("width",W);svg.setAttribute("height",H);svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.innerHTML=defs+paths;
}
function renderQueryDetail(nd){
  const c=COLORS[nd.cat];
  const seg=`<div class="qv-toggle" id="qvToggle">
      <button data-v="outcomes" class="${QV.view==='outcomes'?'on':''}">Outcomes</button>
      <button data-v="types" class="${QV.view==='types'?'on':''}">Query categories</button></div>`;
  let body="";
  if(QV.view==="outcomes"){
    body=renderOutcomesFlow(nd);
  } else {
    let more=`<div class="qd-more">
        <button class="qd-more-btn ${QV.detailed?'open':''}" id="qdMore">${CHEV}${QV.detailed?'Hide detailed breakdown':'Show detailed breakdown'}</button>`;
    if(QV.detailed) more+=renderPie(nd.granular);
    more+=`</div>`;
    body=renderCategoriesFlow(nd)+more;
  }
  document.getElementById("detail").innerHTML=`
    <div class="dhead">
      <div class="dh-title">
        <span class="dcat" style="color:${c}"><span class="dot" style="background:${c}"></span>${CATNAME[nd.cat]}</span>
        <span class="dtitle">${nd.t}</span>
      </div>
    </div>
    <div class="ddesc">${nd.desc}</div>
    ${seg}<div class="qv-body">${body}</div>`;
  const tg=document.getElementById("qvToggle");
  if(tg) tg.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;QV.view=b.dataset.v;renderQueryDetail(nd);});
  const mb=document.getElementById("qdMore");
  if(mb) mb.addEventListener("click",()=>{QV.detailed=!QV.detailed;renderQueryDetail(nd);});
  if(QV.view==="types"){ requestAnimationFrame(layoutCatFlow); if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{ if(document.getElementById("cfLinks")) layoutCatFlow(); }); }
}
function renderDetail(nd){
  const c=COLORS[nd.cat];
  if(nd.outcomes){ renderQueryDetail(nd); return; }
  let metrics="";
  if(nd.pct!=null){
    const i=NODES.indexOf(nd), prev=i>0?NODES[i-1]:null;
    const drop=(A.showDrop&&prev&&prev.pct&&nd.pct<prev.pct)?`<div class="metric drop"><div class="v">−${Math.round((1-nd.pct/prev.pct)*100)}%</div><div class="k">vs previous</div></div>`:"";
    metrics=`<div class="metrics">
      <div class="metric lead"><div class="v">${fmtPct(nd.pct)}</div><div class="k">${A.denom}</div></div>${drop}</div>`;
  }
  const bul=nd.bullets?`<ul class="dbul">${nd.bullets.map(x=>`<li>${x}</li>`).join("")}</ul>`:"";
  const br=nd.branches?`<div class="dbranch">${nd.branches.map(x=>`<span class="dchip">${x}</span>`).join("")}</div>`:"";
  const lp=nd.loop?`<div class="dloop">↻ <span>${nd.loop}</span></div>`:"";
  const src=nd.source?`<div class="dmeta"><b>${nd.srclabel||"Source"}</b>${nd.source}</div>`:"";
  document.getElementById("detail").innerHTML=`
    <div class="dhead">
      <div class="dh-title">
        <span class="dcat" style="color:${c}"><span class="dot" style="background:${c}"></span>${nd.tag||CATNAME[nd.cat]}</span>
        <span class="dtitle">${nd.t}</span>
      </div>${metrics}
    </div>
    <div class="ddesc">${nd.desc}</div>${bul}${br}${lp}${src}`;
}
function select(id){
  if(!byId[id]||byId[id].noselect) return;
  sel=id;
  NODES.forEach(nd=>{ const d=el[nd.id]; d.classList.toggle("active",nd.id===id); });
  renderGhosts(); drawEdges(); renderDetail(byId[id]);
  const nd=byId[id]; const tx=nd.x+nW(nd)/2-scroll.clientWidth/2;
  scroll.scrollTo({left:Math.max(0,tx),behavior:"smooth"});
}
function load(key){
  FK=key; A=FUNNELS[key]; NODES=A.nodes; byId={}; NODES.forEach(x=>byId[x.id]=x);
  lastId=NODES[NODES.length-1].id;
  document.getElementById("ftitle").textContent=A.title;
  document.getElementById("fsub").textContent=A.sub;
  document.querySelectorAll("#toggle button").forEach(b=>b.classList.toggle("on",b.dataset.k===key));
  measure(); buildNodes(); place(); renderGroups(); renderLegend(); drawEdges();
  select(NODES[0].id);
}
function relayout(){ measure(); place(); renderGroups(); renderGhosts(); drawEdges(); }
document.getElementById("toggle").addEventListener("click",e=>{const b=e.target.closest("button");if(b)load(b.dataset.k);});
window.addEventListener("resize",relayout);
new ResizeObserver(()=>relayout()).observe(document.querySelector(".stage"));
document.addEventListener("keydown",e=>{
  if(!sel)return; const i=NODES.findIndex(x=>x.id===sel);
  const L=NODES.length;
  const step=(dir)=>{for(let k=1;k<=L;k++){const j=((i+dir*k)%L+L)%L; if(!NODES[j].noselect) return NODES[j].id;} return NODES[i].id;};
  if(e.key==="ArrowRight"||e.key===" "||e.key==="Spacebar"){e.preventDefault();select(step(1));}
  else if(e.key==="ArrowLeft"){e.preventDefault();select(step(-1));}
});
requestAnimationFrame(()=>requestAnimationFrame(()=>{load("ct");scroll.focus();}));
</script>
